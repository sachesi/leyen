<svg width="256" height="256" viewBox="0 0 256 256" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Leyen game launcher icon</title>
  <desc>Dark blue gradient rounded rectangle with a white play button triangle</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c3f72"/>
      <stop offset="100%" stop-color="#080f28"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="play_grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f2ff"/>
      <stop offset="100%" stop-color="#a8c8f8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect x="8" y="8" width="240" height="240" rx="48"/>
    </clipPath>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#shine)" clip-path="url(#rounded)"/>

  <ellipse cx="128" cy="128" rx="72" ry="72" fill="url(#glow)"/>

  <polygon points="94,76 94,180 190,128" fill="url(#play_grad)" opacity="0.95"/>

  <circle cx="68" cy="200" r="7" fill="#3b82f6" opacity="0.70"/>
  <circle cx="88" cy="200" r="7" fill="#3b82f6" opacity="0.45"/>
  <circle cx="108" cy="200" r="7" fill="#3b82f6" opacity="0.25"/>

  <rect x="8" y="8" width="240" height="240" rx="48" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>
</svg>
